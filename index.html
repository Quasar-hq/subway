<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>막타 | 성균관대역 · 혜화역</title>
    <meta
      name="description"
      content="성균관대역과 혜화역 사이의 막차 시간을 시간표 기준으로 보여주는 서비스"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>막타</h1>
          <p>성균관대역 · 혜화역 막차</p>
        </div>
        <div class="topbar-actions">
          <label class="field compact">
            <span>기준 시각</span>
            <input id="base-time" type="datetime-local" />
          </label>
          <button id="now-time" class="secondary-btn" type="button">현재 시각</button>
          <button id="recalc" class="primary-btn" type="button">갱신</button>
        </div>
        <p id="sync-status" class="sync-status" aria-live="polite">Supabase 연결 대기 중</p>
      </header>

      <section class="routes">
        <article class="route-card">
          <div class="route-head">
            <h2>성균관대역 → 혜화역</h2>
            <span>1호선 → 4호선</span>
          </div>
          <div class="timeline" id="timeline-outbound"></div>
          <div class="result-grid">
            <div class="result-pill">
              <span>막차 출발</span>
              <strong id="outbound-departure">-</strong>
            </div>
            <div class="result-pill">
              <span>도착</span>
              <strong id="outbound-arrival">-</strong>
            </div>
            <div class="result-pill">
              <span>상태</span>
              <strong id="outbound-status">-</strong>
            </div>
          </div>
        </article>

        <article class="route-card">
          <div class="route-head">
            <h2>혜화역 → 성균관대역</h2>
            <span>4호선 → 1호선</span>
          </div>
          <div class="timeline" id="timeline-inbound"></div>
          <div class="result-grid">
            <div class="result-pill">
              <span>막차 출발</span>
              <strong id="inbound-departure">-</strong>
            </div>
            <div class="result-pill">
              <span>도착</span>
              <strong id="inbound-arrival">-</strong>
            </div>
            <div class="result-pill">
              <span>상태</span>
              <strong id="inbound-status">-</strong>
            </div>
          </div>
        </article>
      </section>
    </main>
    <script src="schedule-data.js"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
